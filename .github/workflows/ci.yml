name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.6"
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -x --tb=short -m "not neuron and not simulator" --cov=trnsolver --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver

  # Runs the NKI CPU simulator (Neuron SDK 2.29+, NKI 0.3.0 Stable).
  # neuronx-cc ships from the Neuron pip repo, not public PyPI. Linux x86_64
  # wheels only — ubuntu-latest is fine; macOS runners would need to skip.
  # continue-on-error while the simulator pipeline stabilizes; once the
  # architecture-first kernel redesign lands and tests are reliable, flip
  # this back to a hard check.
  test-simulator:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install neuronx-cc from Neuron pip repo
        # The public Neuron pip index tops out at 2.24.x — the 2.29 SDK ships
        # only on the DLAMI. For CI-side simulator runs we install whatever
        # the index offers and verify nki.simulate_kernel exists before the
        # test step (early versions of neuronxcc pre-date the simulator).
        run: |
          pip install "neuronx-cc" --extra-index-url https://pip.repos.neuron.amazonaws.com
          python -c "from neuronxcc.nki import simulate_kernel" || { echo "nki.simulate_kernel not available in this neuronxcc version; simulator CI job requires an SDK that includes NKI 0.3.0 features. See https://pip.repos.neuron.amazonaws.com for the current public version floor."; exit 1; }
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m simulator --cov=trnsolver --cov-report=xml --cov-append
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver
          flags: simulator
