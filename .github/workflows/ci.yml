name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.6"
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -x --tb=short -m "not neuron and not simulator" --cov=trnsolver --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver

  # Runs the NKI CPU simulator (Neuron SDK 2.29+, NKI 0.3.0 Stable).
  # neuronx-cc ships from the Neuron pip repo, not public PyPI. Linux x86_64
  # wheels only — ubuntu-latest is fine; macOS runners would need to skip.
  # continue-on-error while the simulator pipeline stabilizes; once the
  # architecture-first kernel redesign lands and tests are reliable, flip
  # this back to a hard check.
  test-simulator:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install neuronx-cc (Neuron SDK 2.29 / NKI 0.3.0 Stable)
        run: pip install "neuronx-cc>=2.29" --extra-index-url https://pip.repos.neuron.amazonaws.com
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m simulator --cov=trnsolver --cov-report=xml --cov-append
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver
          flags: simulator
