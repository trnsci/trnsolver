name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv pip install --system "ruff>=0.6"
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv pip install --system -e ".[dev]"
      - run: pytest tests/ -v -x --tb=short -m "not neuron and not simulator" --cov=trnsolver --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver

  # Runs the NKI CPU simulator. neuronx-cc ships from the Neuron pip repo
  # (not public PyPI); the guard below checks nki.simulate_kernel is importable
  # before the test step so a pip-repo regression fails fast with a clear error.
  test-simulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install neuronx-cc from Neuron pip repo
        run: |
          uv pip install --system "neuronx-cc" --extra-index-url https://pip.repos.neuron.amazonaws.com
          python -c "from neuronxcc.nki import simulate_kernel" || { echo "nki.simulate_kernel not available in this neuronxcc version; simulator CI job requires an SDK that includes NKI 0.3.0 features. See https://pip.repos.neuron.amazonaws.com for the current public version floor."; exit 1; }
      - run: uv pip install --system -e ".[dev]"
      - run: pytest tests/ -v -m simulator --cov=trnsolver --cov-report=xml --cov-append
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: trnsci/trnsolver
          flags: simulator
