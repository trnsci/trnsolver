# Pre-commit hooks for trnsolver.
#
# Setup (once per clone):
#   pip install pre-commit
#   pre-commit install
#
# After that, `git commit` runs ruff on staged files automatically. CI enforces
# the same checks (`.github/workflows/ci.yml::lint`), so skipping hooks locally
# just moves the failure to CI.
#
# Run ad-hoc against all files:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
